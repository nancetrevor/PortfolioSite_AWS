name: Deploy static site to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::094941125656:role/PortfolioGitHubActionsDeployRole
          aws-region: us-east-1

      - name: Sync site files to S3
        run: |
          aws s3 sync . s3://trevornance.dev \
            --delete \
            --exclude ".git/*" \
            --exclude ".gitignore" \
            --exclude ".github/*" \
            --exclude "terraform/*" \
            --exclude "scripts/*" \
            --exclude "cypress/*" \
            --exclude "cypress.config.js" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
